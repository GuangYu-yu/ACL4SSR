name: Compare Cloudflare CIDR

on:
  schedule:
    - cron: '0 */12 * * *' # 每12小时运行一次
  workflow_dispatch: # 添加这个以手动触发

jobs:
  compare-cidr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          python -m pip install requests ipaddress

      - name: Run CIDR comparison
        run: |
          python compare_cidr.py

      - name: 提交并推送更改
        if: success()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add Cloudflare-HK.txt Cloudflare-TW.txt Cloudflare-SG.txt Cloudflare-JP.txt Cloudflare-KR.txt
          git commit -m "Auto-update Cloudflare CIDR comparison results"
          git push
