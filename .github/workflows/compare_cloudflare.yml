name: Compare CIDRs

on:
  workflow_dispatch:  # 手动触发
  schedule:
    - cron: "0 */12 * * *"  # 每 12 小时运行一次

jobs:
  compare-cidrs:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 安装依赖
        run: pip install netaddr requests

      - name: 运行 CIDR 比较脚本
        run: python compare_cidr.py

      - name: 提交并推送更改
        if: success()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add Cloudflare-*.txt
          git commit -m "Auto-update Cloudflare CIDR files"
          git push
