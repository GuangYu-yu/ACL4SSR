name: Update IP CIDR Files

on:
  schedule:
    - cron: '0 */12 * * *' # 每12小时运行一次
  workflow_dispatch: # 允许手动触发

jobs:
  update-files:
    runs-on: ubuntu-latest

    steps:
    - name: 检查出当前仓库
      uses: actions/checkout@v3

    - name: 下载并处理 chnroute_v6.txt
      run: |
        curl -s https://raw.githubusercontent.com/mayaxcn/china-ip-list/master/chnroute_v6.txt | \
        sed 's/^/IP-CIDR,/' | sed 's/$/,no-resolve/' > chnroute_v6_processed.txt

    - name: 下载并处理 CN-ip-cidr.txt
      run: |
        curl -s https://raw.githubusercontent.com/Hackl0us/GeoIP2-CN/release/CN-ip-cidr.txt | \
        sed 's/^/IP-CIDR,/' | sed 's/$/,no-resolve/' > cn-ip-cidr_processed.txt

    - name: 提交并推送更改
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add .
        git commit -m "Auto-update IP CIDR files"
        git push
