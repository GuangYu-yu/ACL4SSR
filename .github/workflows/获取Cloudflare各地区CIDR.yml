name: 获取Cloudflare各地区CIDR

on:
  workflow_dispatch:  # 手动触发
  schedule:
    - cron: "0 */12 * * *"  # 每 12 小时运行一次

jobs:
  compare-cidrs:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 安装依赖
        run: pip install netaddr requests

      - name: 运行 获取Cloudflare各地区CIDR脚本
        run: python 获取Cloudflare各地区CIDR.py

      - name: 检查是否有更改  # 这个步骤是新增的，用来检查是否有文件更改
        id: check_changes
        run: |
          git add Cloudflare-*.txt
          if git diff-index --quiet HEAD --; then
            echo "没有检测到文件更改，跳过提交步骤。" >> $GITHUB_ENV
          else
            echo "有文件更改。" >> $GITHUB_ENV
          fi

      - name: 提交并推送更改  # 如果有变更，则提交并推送
        if: env.GITHUB_ENV == '有文件更改。'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git commit -m "自动更新 Cloudflare CIDR 文件"
          git push
