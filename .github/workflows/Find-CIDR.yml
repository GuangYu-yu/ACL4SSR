name: Find Cloudflare CIDR for Specific Countries

on:
  schedule:
    - cron: '0 */12 * * *'  # 每12小时运行一次
  workflow_dispatch:

jobs:
  find-cidr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mmdb-bin curl grep

      - name: Download GeoLite2-Country.mmdb
        run: |
          curl -L -o GeoLite2-Country.mmdb https://raw.githubusercontent.com/Loyalsoldier/geoip/release/GeoLite2-Country.mmdb

      - name: Download Cloudflare CIDR list
        run: |
          curl -L -o CIDR.txt https://raw.githubusercontent.com/GuangYu-yu/About-Cloudflare/main/output_folder/CIDR.txt

      - name: Extract CIDR for Hong Kong (HK)
        run: |
          mmdblookup --file GeoLite2-Country.mmdb --ip <Cloudflare IP> | grep 'HK' > HK.txt

      - name: Extract CIDR for Singapore (SG)
        run: |
          mmdblookup --file GeoLite2-Country.mmdb --ip <Cloudflare IP> | grep 'SG' > SG.txt

      - name: Extract CIDR for Japan (JP)
        run: |
          mmdblookup --file GeoLite2-Country.mmdb --ip <Cloudflare IP> | grep 'JP' > JP.txt

      - name: Extract CIDR for South Korea (KR)
        run: |
          mmdblookup --file GeoLite2-Country.mmdb --ip <Cloudflare IP> | grep 'KR' > KR.txt

      - name: Extract CIDR for Taiwan (TW)
        run: |
          mmdblookup --file GeoLite2-Country.mmdb --ip <Cloudflare IP> | grep 'TW' > TW.txt

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add HK.txt SG.txt JP.txt KR.txt TW.txt
          git commit -m "Update CIDR files"
          git push
