name: Find Overlapping CIDR Blocks for Specific Countries

on:
  schedule:
    - cron: '0 */12 * * *'  # 每12小时运行一次
  workflow_dispatch:

jobs:
  find-cidr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mmdb-bin curl

      - name: Download GeoLite2-ASN.mmdb
        run: |
          curl -L -o GeoLite2-ASN.mmdb https://raw.githubusercontent.com/Loyalsoldier/geoip/release/GeoLite2-ASN.mmdb

      - name: Download Cloudflare CIDR list
        run: |
          curl -L -o CIDR.txt https://raw.githubusercontent.com/GuangYu-yu/About-Cloudflare/main/output_folder/CIDR.txt

      - name: Extract IP ranges and find overlaps
        run: |
          # 定义需要提取的国家和 ASN
          countries=("HK" "SG" "JP" "KR" "TW")
          asns=("AS4808" "AS4134" "AS4766" "AS2914" "AS4515") # 替换为实际 ASN 列表

          # 创建输出目录
          mkdir -p outputs

          # 提取 IP 段并查找重叠
          for country in "${countries[@]}"; do
            echo "Processing $country"

            # 创建临时文件存储该国的 IP 地址段
            tmpfile=$(mktemp)

            # 提取对应国家的 IP 地址段
            for asn in "${asns[@]}"; do
              mmdblookup --file GeoLite2-ASN.mmdb --ip ${asn} >> "$tmpfile"
            done

            # 查找 CIDR 重叠
            echo "Finding overlaps for $country"
            # 假设提取出的 IP 地址段存储在 $tmpfile
            iprange --overlap CIDR.txt "$tmpfile" > "outputs/${country}.txt"

            # 清理临时文件
            rm "$tmpfile"
          done

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add outputs/*
          git commit -m "Update CIDR files for HK, SG, JP, KR, TW"
          git push
