name: Find Cloudflare CIDR Overlaps by Country

on:
  schedule:
    - cron: '0 */12 * * *'  # 每12小时运行一次
  workflow_dispatch:

jobs:
  find-overlaps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl python3 python3-pip
          pip3 install geoip2 netaddr

      - name: Download GeoLite2-ASN.mmdb
        run: |
          curl -L -o GeoLite2-ASN.mmdb https://raw.githubusercontent.com/Loyalsoldier/geoip/release/GeoLite2-ASN.mmdb

      - name: Download Cloudflare CIDR list
        run: |
          curl -L -o CIDR.txt https://raw.githubusercontent.com/GuangYu-yu/About-Cloudflare/main/output_folder/CIDR.txt

      - name: Create output directory
        run: mkdir -p outputs

      - name: Run Python script to find overlaps
        run: python3 find_overlaps.py

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add outputs/*
          git commit -m "Updated Cloudflare CIDR overlaps by country"
          git push
