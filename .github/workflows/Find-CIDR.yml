name: Find Cloudflare CIDR Overlaps by Country

on:
  schedule:
    - cron: '0 */12 * * *'  # 每12小时运行一次
  workflow_dispatch:

jobs:
  find-overlaps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl python3 python3-pip
          pip3 install geoip2 netaddr

      - name: Download GeoLite2-ASN.mmdb
        run: |
          curl -L -o GeoLite2-ASN.mmdb https://raw.githubusercontent.com/Loyalsoldier/geoip/release/GeoLite2-ASN.mmdb

      - name: Download Cloudflare CIDR list
        run: |
          curl -L -o CIDR.txt https://raw.githubusercontent.com/GuangYu-yu/About-Cloudflare/main/output_folder/CIDR.txt

      - name: Extract overlapping CIDR ranges
        run: |
          # 创建 Python 脚本以查找重叠的 CIDR 段并按国家分类
          echo '
import geoip2.database
from netaddr import IPNetwork, IPSet
from collections import defaultdict

# 定义目标国家代码
target_countries = ["HK", "SG", "JP", "KR", "TW"]

# 读取 Cloudflare CIDR
with open("CIDR.txt") as f:
    cloudflare_cidrs = [IPNetwork(line.strip()) for line in f if line.strip()]

# 打开 GeoLite2-ASN.mmdb 数据库
reader = geoip2.database.Reader("GeoLite2-ASN.mmdb")

# 准备存储结果的字典
country_cidr_map = defaultdict(IPSet)

# 遍历 Cloudflare CIDR
for cidr in cloudflare_cidrs:
    try:
        # 获取 ASN 信息并判断所属国家
        response = reader.asn(cidr.network)
        country_code = response.country.iso_code

        # 如果这个 CIDR 属于目标国家之一，保存到对应国家的集合中
        if country_code in target_countries:
            country_cidr_map[country_code].add(cidr)
    except geoip2.errors.AddressNotFoundError:
        pass

# 为每个国家输出 CIDR 结果
for country_code, cidrs in country_cidr_map.items():
    with open(f"outputs/{country_code}.txt", "w") as f:
        for cidr in cidrs.iter_cidrs():
            f.write(f"{cidr}\n")

' > find_overlaps.py

          # 创建输出目录
          mkdir -p outputs

          # 运行 Python 脚本
          python3 find_overlaps.py

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add outputs/*
          git commit -m "Updated Cloudflare CIDR overlaps by country"
          git push
