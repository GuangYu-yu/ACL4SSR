name: Find Cloudflare CIDR for Specific Countries

on:
  schedule:
    - cron: '0 */12 * * *'  # 每12小时运行一次
  workflow_dispatch:

jobs:
  find-cidr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mmdb-bin curl grep

      - name: Download GeoLite2-Country.mmdb
        run: |
          curl -L -o GeoLite2-Country.mmdb https://raw.githubusercontent.com/Loyalsoldier/geoip/release/GeoLite2-Country.mmdb

      - name: Download Cloudflare CIDR list
        run: |
          curl -L -o CIDR.txt https://raw.githubusercontent.com/GuangYu-yu/About-Cloudflare/main/output_folder/CIDR.txt

      - name: Process Cloudflare CIDR for each country
        run: |
          # 遍历CIDR.txt中的每个IP
          while IFS= read -r cidr; do
            # 使用mmdblookup检查每个IP所属的国家
            country=$(mmdblookup --file GeoLite2-Country.mmdb --ip "${cidr}" | grep 'iso_code' | awk -F '"' '{print $4}')
            
            # 根据国家将IP地址段保存到对应的文件
            case $country in
              HK)
                echo "$cidr" >> HK.txt
                ;;
              SG)
                echo "$cidr" >> SG.txt
                ;;
              JP)
                echo "$cidr" >> JP.txt
                ;;
              KR)
                echo "$cidr" >> KR.txt
                ;;
              TW)
                echo "$cidr" >> TW.txt
                ;;
            esac
          done < CIDR.txt

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add HK.txt SG.txt JP.txt KR.txt TW.txt
          git commit -m "Update CIDR files"
          git push
